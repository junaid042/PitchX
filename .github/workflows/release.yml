name: Build and Release PitchX MSI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Setup WiX v3
      run: |
        echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      shell: powershell

    - name: Install signing certificate
      run: |
        $pfx = [Convert]::FromBase64String("${{ secrets.CERTIFICATE_PFX }}")
        $pfxPath = "$env:RUNNER_TEMP\pitchx.pfx"
        [IO.File]::WriteAllBytes($pfxPath, $pfx)
        Import-PfxCertificate `
          -FilePath $pfxPath `
          -CertStoreLocation Cert:\CurrentUser\My `
          -Password (ConvertTo-SecureString "${{ secrets.CERTIFICATE_PWD }}" -AsPlainText -Force)
        Remove-Item $pfxPath
      shell: powershell

    - name: Restore NuGet packages
      run: nuget restore PitchX.sln

    - name: Build solution
      run: msbuild PitchX.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Rename MSI
      run: copy Setup\bin\Release\Setup.msi PitchX.msi
      shell: powershell

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: PitchX.msi
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}