name: Build and Release PitchX MSI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Install WiX v3
      run: |
        choco install wixtoolset --version=3.14.1 -y
        echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $env:GITHUB_PATH
      shell: powershell

    - name: Restore NuGet packages
      run: nuget restore PitchX.sln

    - name: Disable ClickOnce signing
      run: |
        (Get-Content PitchX\TLBR.csproj) -replace '<SignManifests>true</SignManifests>', '<SignManifests>false</SignManifests>' | Set-Content PitchX\TLBR.csproj
      shell: powershell

    - name: Build solution
      run: msbuild PitchX.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Rename MSI
      run: copy Setup\bin\Release\Setup.msi PitchX.msi
      shell: powershell

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: PitchX.msi
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}